name: Build

on:
  workflow_dispatch:
  pull_request:
    branches:
      - "main"
    paths-ignore:
      - .github/ISSUE_TEMPLATE/*
      - .github/FUNDING.yaml
      - .github/PULL_REQUEST_TEMPLATE/*
      - .vscode/*
      - README.md
      - justfile

env:
  CARGO_TERM_COLOR: always

jobs:

  build:
    strategy:
      matrix:
        builds:
          # - target: x86_64-pc-windows-msvc
          #   os: windows-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest

    runs-on: ${{ matrix.builds.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --target "${{ matrix.builds.target }}"

      - name: Test
        run: cargo test --target "${{ matrix.builds.target }}"
